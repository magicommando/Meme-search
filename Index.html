<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Search Engine</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
</head>
<h1 style="text-align: center;">Search Memes and make memes!!</h1>
<body>
    <header>
    <h1 class="site-title">Meme Search</h1>
      <nav class="navbar">
           <a href="#">Home</a>
           <a href="#">Top Memes</a>
           <a href="#">Create</a>
           <a href="#">About</a> 
      </nav>  
    </header>

    <section class="search-section">
      <form id="searchForm"></form>
        <input type="search" id="searchInput" placeholder="Search memes..." />

        <button type="button" id="getTopMemes">Get Top Memes</button>
        <button type="button" id="makeMemes">Make Memes</button>
      </form>
    </section> 
    
    <main id="results" class="grid-container">

    </main>
    <footer>
        <p> Keep searching...<span id="pageNumbers">1 2 3 4 5 6</span> <a href="#">Next</a></p>
        <small>Sourced from Imgflip API !2026</small>
    </footer>
    <script src="js/Main.js"></script>
</body>

</html>
